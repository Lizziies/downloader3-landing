def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.downloader3.app"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // 💜 Eigene, feste Paket-ID -- wichtig für den Update-Mechanismus:
        // eine .apk mit anderer applicationId würde Android als "andere
        // App" behandeln statt als Update, und die Installation über die
        // bestehende App drüber lehnt Android dann ab.
        applicationId "com.downloader3.app"
        // 🎬 youtubedl-android (Python+yt-dlp fürs Handy, siehe
        // DownloaderPlugin.kt) bringt native Bibliotheken für diese vier
        // Prozessor-Architekturen mit -- ohne diesen Filter würde Gradle
        // eine .apk bauen, die auf mind. einer davon abstürzt.
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // 🔑 Release-Signatur: ohne eigenes Keystore signiert Gradle
    // automatisch mit dem Debug-Key (siehe README-Hinweis zum ersten
    // echten Release -- SOLLTE für Play Store/Weiterverteilung durch
    // einen eigenen Keystore ersetzt werden, für "APK von der eigenen
    // Webseite" reicht das erstmal, damit CI überhaupt baut).
    signingConfigs {
        release {
            if (System.getenv("DL3_KEYSTORE_PATH")) {
                storeFile file(System.getenv("DL3_KEYSTORE_PATH"))
                storePassword System.getenv("DL3_KEYSTORE_PASSWORD")
                keyAlias System.getenv("DL3_KEY_ALIAS")
                keyPassword System.getenv("DL3_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig (System.getenv("DL3_KEYSTORE_PATH")
                ? signingConfigs.release
                : signingConfigs.debug)
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

// 🎬 Der eigentliche Download-Motor: youtubedl-android bündelt Python +
// yt-dlp fürs Handy (derselbe yt-dlp, den auch die Windows-App nutzt),
// als fertige, gepflegte Bibliothek -- veröffentlicht direkt auf Maven
// Central (kein zusätzliches JitPack-Repository nötig, siehe
// android/build.gradle). Version + Koordinaten wurden VORHER über die
// offizielle GitHub-README + Maven-Central-Seite geprüft (nicht
// geraten), damit hier nicht derselbe Fehler passiert wie beim
// ursprünglichen gofile.io-Umbau (falscher Endpunkt geraten -> 404).
dependencies {
    def youtubedlAndroid = "0.18.1"
    implementation "io.github.junkfood02.youtubedl-android:library:$youtubedlAndroid"
    implementation "io.github.junkfood02.youtubedl-android:ffmpeg:$youtubedlAndroid"
}
