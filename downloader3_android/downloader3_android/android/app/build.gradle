plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

android {
    namespace "com.downloader3.app"
    compileSdk 34
            ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.downloader3.app"
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            if (System.getenv("DL3_KEYSTORE_PATH")) {
                storeFile file(System.getenv("DL3_KEYSTORE_PATH"))
                storePassword System.getenv("DL3_KEYSTORE_PASSWORD")
                keyAlias System.getenv("DL3_KEY_ALIAS")
                keyPassword System.getenv("DL3_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig (System.getenv("DL3_KEYSTORE_PATH")
                ? signingConfigs.release
                : signingConfigs.debug)
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    def youtubedlAndroid = "0.18.1"
    implementation "io.github.junkfood02.youtubedl-android:library:$youtubedlAndroid"
    implementation "io.github.junkfood02.youtubedl-android:ffmpeg:$youtubedlAndroid"
}
