name: Build Android APK

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Get Flutter packages
        run: flutter pub get

      - name: Restore signing keystore (if configured)
        env:
          DL3_KEYSTORE_BASE64: ${{ secrets.DL3_KEYSTORE_BASE64 }}
          DL3_KEYSTORE_PASSWORD: ${{ secrets.DL3_KEYSTORE_PASSWORD }}
          DL3_KEY_ALIAS: ${{ secrets.DL3_KEY_ALIAS }}
          DL3_KEY_PASSWORD: ${{ secrets.DL3_KEY_PASSWORD }}
        run: |
          if [ -n "$DL3_KEYSTORE_BASE64" ]; then
            echo "$DL3_KEYSTORE_BASE64" | base64 -d > /tmp/dl3-release.keystore
            echo "DL3_KEYSTORE_PATH=/tmp/dl3-release.keystore" >> "$GITHUB_ENV"
            echo "DL3_KEYSTORE_PASSWORD=$DL3_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "DL3_KEY_ALIAS=$DL3_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "DL3_KEY_PASSWORD=$DL3_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "Kein eigener Signatur-Schlüssel hinterlegt, nutze Debug-Signatur."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk \
             "out/Downloader3-${{ github.ref_name }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloader3-apk
          path: out/*.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          tag_name: ${{ github.ref_name }}
          name: "Downloader<3 Android ${{ github.ref_name }}"
          body: |
            Automatisch gebaute Android-APK von Downloader<3.
            Herunterladen, öffnen, "Installation aus unbekannten Quellen"
            einmalig erlauben, fertig.
